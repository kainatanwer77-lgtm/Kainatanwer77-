<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6f9}
nav{background:#2c3e50;color:white;padding:15px;text-align:center}
.container{width:90%;margin:auto;margin-top:20px}
button{padding:10px;background:#27ae60;color:white;border:none;margin-top:10px}
.card{background:white;padding:15px;margin-top:20px;border-radius:10px}
</style>

</head>

<body>

<nav>
<h2>Kainat Dashboard</h2>
<button onclick="logout()">Logout</button>
</nav>

<div class="container">

<input id="name" placeholder="Customer Name">

<div class="card">
<h3>Products</h3>
Laptop: <input id="laptop" type="number"><br>
Mobile: <input id="mobile" type="number"><br>
Headphones: <input id="headphones" type="number"><br>

<button onclick="generate()">Generate Invoice</button>
</div>

<div class="card" id="invoice"></div>

</div>

<script>

// LOGIN CHECK
if(localStorage.getItem("login") !== "true"){
    window.location.href = "index.html";
}

// LOGOUT
function logout(){
localStorage.removeItem("login");
window.location.href = "index.html";
}

// GENERATE
function generate(){
let subtotal = 0;

let l = parseInt(laptop.value)||0;
let m = parseInt(mobile.value)||0;
let h = parseInt(headphones.value)||0;

subtotal += l*2500;
subtotal += m*1800;
subtotal += h*700;

if(subtotal == 0){
    alert("Select items");
    return;
}

let discount = subtotal>5000 ? subtotal*0.1 : 0;
let total = subtotal - discount;

invoice.innerHTML = `
<h3>Invoice</h3>
<p>Total: Rs ${total}</p>
`;
}
</script>

</body>
</html>
