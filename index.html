<!DOCTYPE html>
<html>
<head>
<title>Login - Kainat System</title>
<style>
body{font-family:Arial;background:#2c3e50;color:white;text-align:center}
.box{background:white;color:black;padding:30px;width:300px;margin:100px auto;border-radius:10px}
input{padding:10px;margin:10px;width:90%}
button{padding:10px;background:#27ae60;color:white;border:none}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>
<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<script>
function login(){
let u=user.value;
let p=pass.value;

if(u=="kainat" && p=="1234"){
localStorage.setItem("login","true");
window.location="dashboard.html";
}else{
alert("Wrong login");
}
}
</script>

</body>
</html>
