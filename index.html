<!DOCTYPE html>
<html>
<head>
<title>Kainat Smart Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🛍️ Kainat Smart Store</h1>
</header>

<div class="container">

<input type="text" id="name" placeholder="Enter Your Name">

<div class="product">
    <img src="https://cdn-icons-png.flaticon.com/512/1041/1041916.png">
    <h3>Laptop - Rs 50000</h3>
    <input type="number" id="laptop">
</div>

<div class="product">
    <img src="https://cdn-icons-png.flaticon.com/512/15/15874.png">
    <h3>Mobile - Rs 40000</h3>
    <input type="number" id="mobile">
</div>

<div class="product">
    <img src="https://cdn-icons-png.flaticon.com/512/727/727245.png">
    <h3>Headphones - Rs 2500</h3>
    <input type="number" id="headphones">
</div>

<button onclick="generateInvoice()">Generate Invoice</button>

<div id="invoice"></div>

<h2>Order History</h2>
<div id="history"></div>

</div>

<script src="script.js"></script>
</body>
</html>
