<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kainat Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header>
  <h2>Kainat Store</h2>
  <input type="text" placeholder="Search products...">
</header>

<!-- MAIN -->
<div class="container">

  <!-- LEFT CATEGORY -->
  <div class="categories">
    <ul>
      <li onclick="filterProducts('all')">All</li>
      <li onclick="filterProducts('electronics')">Electronics</li>
      <li onclick="filterProducts('cosmetics')">Cosmetics</li>
      <li onclick="filterProducts('kids')">Kids</li>
      <li onclick="filterProducts('jewelry')">Jewelry</li>
      <li onclick="filterProducts('fashion')">Fashion</li>
    </ul>
  </div>

  <!-- RIGHT PRODUCTS -->
  <div class="products" id="productList">
    <!-- JS se load honge -->
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button>Home</button>
  <button>Categories</button>
  <button>Cart</button>
  <button>Account</button>
</div>

<script src="script.js"></script>
</body>
</html>
