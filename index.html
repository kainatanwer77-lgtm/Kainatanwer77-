<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kainat Store – Pakistan's Premium Fashion</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --rose:#e8445a;--rose-dark:#c73048;--rose-pale:#fff0f2;
  --gold:#d4a843;--gold-light:#f5d98a;
  --ink:#1a0a0f;--ink2:#2e1a22;--ink3:#5a3a46;
  --smoke:#f8f4f5;--border:#eedde1;
  --success:#1db954;
  --shadow-sm:0 2px 8px rgba(26,10,15,.08);
  --shadow-md:0 8px 28px rgba(26,10,15,.13);
  --shadow-lg:0 20px 60px rgba(26,10,15,.18);
  --r:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--smoke);color:var(--ink);overflow-x:hidden}
#ldr{position:fixed;inset:0;background:#fff;z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity .5s}
#ldr.hide{opacity:0;pointer-events:none}
.ld-logo{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:700;color:var(--rose);letter-spacing:3px}
.ld-bar{width:220px;height:3px;background:var(--border);border-radius:99px;overflow:hidden}
.ld-fill{height:100%;background:var(--rose);animation:ldAnim 1s ease forwards}
@keyframes ldAnim{from{width:0}to{width:100%}}
.ann{background:var(--ink);color:#fff;padding:9px;overflow:hidden;font-size:.7rem;letter-spacing:1.5px}
.ann-inner{display:flex;width:max-content;animation:annScroll 28s linear infinite}
.ann-inner span{padding:0 50px;white-space:nowrap;opacity:.85}
.ann-inner strong{color:var(--gold)}
@keyframes annScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.topbar{background:var(--rose);display:flex;align-items:center;justify-content:space-between;padding:7px 48px;font-size:.72rem;flex-wrap:wrap;gap:6px}
.topbar a,.topbar span{color:rgba(255,255,255,.92);text-decoration:none}
.topbar a:hover{text-decoration:underline;color:#fff}
.tb-right{display:flex;gap:22px;align-items:center}
nav{position:sticky;top:0;z-index:900;background:#fff;border-bottom:1px solid var(--border);box-shadow:var(--shadow-sm)}
.nav-in{display:flex;align-items:center;padding:0 48px;height:70px;gap:16px}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:700;color:var(--rose);text-decoration:none;flex-shrink:0;margin-right:20px}
.nav-logo span{color:var(--ink);font-weight:400}
.nav-search{flex:1;max-width:480px;position:relative}
.nav-search input{width:100%;padding:11px 46px 11px 16px;border:2px solid var(--border);border-radius:var(--r);font-size:.84rem;outline:none;background:var(--smoke);transition:border .2s;font-family:'DM Sans',sans-serif}
.nav-search input:focus{border-color:var(--rose);background:#fff}
.nav-search button{position:absolute;right:0;top:0;bottom:0;width:44px;background:var(--rose);border:none;border-radius:0 var(--r) var(--r) 0;color:#fff;cursor:pointer;font-size:.95rem}
.nav-actions{display:flex;gap:6px;margin-left:auto}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 10px;background:none;border:none;cursor:pointer;color:var(--ink3);font-size:10px;letter-spacing:.5px;text-transform:uppercase;border-radius:var(--r);transition:all .2s;text-decoration:none}
.nav-btn:hover{background:var(--rose-pale);color:var(--rose)}
.nav-btn .ico{font-size:1.3rem}
.cart-nb{background:var(--rose);color:#fff!important;flex-direction:row;gap:8px;font-size:.84rem;font-weight:700;padding:10px 18px}
.cart-nb:hover{background:var(--rose-dark)!important}
.cbadge{background:#fff;color:var(--rose);border-radius:50%;width:20px;height:20px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.subnav{background:#fff;border-bottom:2px solid var(--border)}
.subnav ul{display:flex;list-style:none;padding:0 48px;overflow-x:auto}
.subnav a{display:block;padding:12px 14px;font-size:.84rem;font-weight:500;color:var(--ink3);text-decoration:none;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.subnav a:hover,.subnav a.act{color:var(--rose);border-bottom-color:var(--rose);font-weight:700}
.hero{background:var(--ink2);overflow:hidden;position:relative;min-height:500px;display:flex;align-items:center}
.hero-content{padding:64px 80px;z-index:2;max-width:600px;position:relative}
.hero-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(232,68,90,.2);border:1px solid rgba(232,68,90,.4);color:var(--gold-light);padding:6px 16px;border-radius:20px;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:22px}
.hero-h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.6rem,4.5vw,5rem);color:#fff;font-weight:700;line-height:1.04;margin-bottom:18px}
.hero-h1 em{color:var(--gold);font-style:normal}
.hero-p{color:rgba(255,255,255,.65);font-size:.96rem;line-height:1.85;max-width:420px;margin-bottom:34px}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap}
.hero-img-half{position:absolute;right:0;top:0;bottom:0;width:48%;overflow:hidden}
.hero-img-half img{width:100%;height:100%;object-fit:cover;opacity:.55}
.hero-img-half::before{content:'';position:absolute;inset:0;background:linear-gradient(to right,var(--ink2) 0%,transparent 60%);z-index:1}
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;border-radius:var(--r);font-size:.84rem;font-weight:700;cursor:pointer;text-decoration:none;transition:all .25s;border:2px solid transparent;font-family:'DM Sans',sans-serif}
.btn-rose{background:var(--rose);color:#fff;border-color:var(--rose)}
.btn-rose:hover{background:var(--rose-dark);transform:translateY(-2px);box-shadow:0 8px 24px rgba(232,68,90,.4)}
.btn-ghost{background:transparent;color:#fff;border-color:rgba(255,255,255,.4)}
.btn-ghost:hover{border-color:#fff;background:rgba(255,255,255,.1)}
.promo-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border)}
.promo-cell{background:#fff;padding:18px 20px;display:flex;align-items:center;gap:12px;transition:background .2s}
.promo-cell:hover{background:var(--rose-pale)}
.promo-ico{font-size:1.8rem;flex-shrink:0}
.promo-cell strong{display:block;font-size:.82rem;font-weight:700;margin-bottom:1px}
.promo-cell small{font-size:.7rem;color:var(--ink3)}
.sec{padding:56px 48px}
.sec-white{background:#fff}
.sec-smoke{background:var(--smoke)}
.sec-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:36px;flex-wrap:wrap;gap:10px}
.sec-lbl{font-size:.7rem;letter-spacing:3px;text-transform:uppercase;color:var(--rose);font-weight:700;margin-bottom:6px}
.sec-h2{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:700;color:var(--ink);line-height:1.1}
.sec-h2 em{color:var(--rose);font-style:normal}
.see-all{font-size:.82rem;color:var(--rose);text-decoration:none;font-weight:700;display:flex;align-items:center;gap:6px;border:1.5px solid var(--rose);padding:8px 16px;border-radius:var(--r);white-space:nowrap;transition:all .2s}
.see-all:hover{background:var(--rose);color:#fff}
.prod-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}
.p-card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:var(--shadow-sm);transition:box-shadow .3s,transform .3s;position:relative}
.p-card:hover{box-shadow:var(--shadow-md);transform:translateY(-5px)}
.p-img-wrap{position:relative;overflow:hidden;background:linear-gradient(135deg,#f8e8ea,#f0dce0)}
.p-img-wrap img{width:100%;height:290px;object-fit:cover;display:block;transition:transform .5s}
.p-card:hover .p-img-wrap img{transform:scale(1.07)}
.p-badge{position:absolute;top:10px;left:10px;padding:4px 10px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;z-index:2}
.b-new{background:var(--ink);color:#fff}
.b-sale{background:var(--rose);color:#fff}
.b-hot{background:var(--gold);color:var(--ink)}
.p-wish{position:absolute;top:10px;right:10px;width:32px;height:32px;background:#fff;border:none;border-radius:50%;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);z-index:2;opacity:0;transition:all .2s}
.p-card:hover .p-wish{opacity:1}
.p-wish.on,.p-wish:hover{background:var(--rose);color:#fff}
.p-add-btn{position:absolute;bottom:0;left:0;right:0;background:var(--rose);color:#fff;border:none;padding:13px;font-size:.78rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transform:translateY(100%);transition:transform .3s;z-index:2;font-family:'DM Sans',sans-serif}
.p-card:hover .p-add-btn{transform:translateY(0)}
.p-add-btn:hover{background:var(--rose-dark)}
.p-body{padding:14px}
.p-brand{font-size:10px;color:var(--rose);letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:4px}
.p-name{font-size:.86rem;color:var(--ink);font-weight:500;line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.p-stars{color:var(--gold);font-size:.7rem;letter-spacing:1px;margin-bottom:8px}
.p-price-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.p-now{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;color:var(--rose)}
.p-was{font-size:.72rem;color:#bbb;text-decoration:line-through}
.p-off{font-size:10px;background:var(--rose-pale);color:var(--rose);padding:2px 6px;border-radius:3px;font-weight:700}
.sold-wrap{margin-top:8px}
.sold-lbl{font-size:10px;color:var(--ink3);margin-bottom:3px}
.sold-track{background:var(--border);border-radius:99px;height:4px;overflow:hidden}
.sold-fill{height:100%;border-radius:99px;background:linear-gradient(to right,var(--rose),var(--gold))}
.flash-sec{background:linear-gradient(135deg,var(--ink) 0%,var(--ink2) 100%);padding:56px 48px}
.flash-hd{display:flex;align-items:center;gap:22px;margin-bottom:32px;flex-wrap:wrap}
.flash-badge{background:var(--rose);color:#fff;padding:8px 18px;border-radius:4px;font-size:.84rem;font-weight:700;letter-spacing:1px}
.flash-lbl{font-family:'Cormorant Garamond',serif;font-size:2rem;color:#fff;font-weight:700}
.timer{display:flex;gap:8px;align-items:center}
.t-box{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.13);border-radius:var(--r);padding:10px 14px;text-align:center;min-width:58px}
.t-num{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--gold-light);font-weight:700;line-height:1;display:block}
.t-lbl{font-size:9px;color:rgba(255,255,255,.45);letter-spacing:2px;text-transform:uppercase;display:block;margin-top:2px}
.t-sep{color:var(--gold);font-size:1.4rem}
.cat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.cat-card{position:relative;border-radius:10px;overflow:hidden;aspect-ratio:2/3;box-shadow:var(--shadow-sm);cursor:pointer}
.cat-card img{width:100%;height:100%;object-fit:cover;transition:transform .5s;display:block}
.cat-card:hover img{transform:scale(1.08)}
.cat-card::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(26,10,15,.8) 0%,transparent 55%)}
.cat-info{position:absolute;bottom:0;left:0;right:0;padding:14px 12px;z-index:2}
.cat-name{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:#fff;font-weight:700;display:block}
.cat-cnt{font-size:.65rem;color:var(--gold-light);letter-spacing:1px;display:block;margin-top:2px}
.rev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.rev-card{background:#fff;border-radius:var(--r);padding:26px;border:1px solid var(--border);transition:border-color .3s,box-shadow .3s}
.rev-card:hover{border-color:var(--rose);box-shadow:var(--shadow-md)}
.r-stars{color:var(--gold);font-size:.84rem;letter-spacing:2px;margin-bottom:12px}
.r-text{font-size:.84rem;color:var(--ink3);line-height:1.85;margin-bottom:16px;font-style:italic}
.r-author{display:flex;align-items:center;gap:12px}
.r-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700}
.av-a{background:var(--rose-pale);color:var(--rose)}
.av-b{background:#f0edf1;color:var(--ink)}
.av-c{background:#fdf6e3;color:var(--gold)}
.r-name{font-weight:700;font-size:.84rem}
.r-loc{font-size:.72rem;color:var(--ink3);margin-top:1px}
.r-tick{font-size:10px;color:var(--success);font-weight:700;margin-top:2px}
.cta-ban{background:linear-gradient(135deg,var(--rose) 0%,#a02035 100%);display:grid;grid-template-columns:1fr auto;align-items:center;padding:56px 48px;gap:32px}
.cta-ban h2{font-family:'Cormorant Garamond',serif;font-size:2.6rem;color:#fff;font-weight:700;margin-bottom:10px}
.cta-ban p{color:rgba(255,255,255,.78);font-size:.96rem;max-width:480px;line-height:1.8}
.cta-btns{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap}
.cta-btn{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.28);color:#fff;padding:12px 22px;border-radius:var(--r);text-decoration:none;transition:all .2s;cursor:pointer}
.cta-btn:hover{background:rgba(255,255,255,.26)}
.cta-btn .ci{font-size:1.7rem}
.cta-btn small{font-size:10px;opacity:.8;text-transform:uppercase;letter-spacing:1px;display:block}
.cta-btn strong{font-size:.96rem;display:block}
.cta-emo{font-size:7rem;opacity:.18}
.nl{background:var(--ink);padding:56px 48px;text-align:center}
.nl h2{font-family:'Cormorant Garamond',serif;font-size:2.6rem;color:#fff;font-weight:700;margin-bottom:10px}
.nl p{color:rgba(255,255,255,.5);font-size:.96rem;margin-bottom:28px}
.nl-form{display:flex;max-width:520px;margin:0 auto}
.nl-form input{flex:1;padding:16px 20px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-right:0;color:#fff;font-size:.84rem;outline:none;border-radius:var(--r) 0 0 var(--r);font-family:'DM Sans',sans-serif}
.nl-form input::placeholder{color:rgba(255,255,255,.3)}
.nl-form input:focus{border-color:var(--rose)}
.nl-form button{background:var(--rose);color:#fff;border:none;padding:16px 28px;font-size:.84rem;font-weight:700;cursor:pointer;border-radius:0 var(--r) var(--r) 0;font-family:'DM Sans',sans-serif;transition:background .2s}
.nl-form button:hover{background:var(--rose-dark)}
footer{background:var(--ink2);padding:64px 48px 0}
.f-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1.3fr;gap:40px;margin-bottom:48px}
.f-logo{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:var(--rose);text-decoration:none;display:block;margin-bottom:12px}
.f-desc{font-size:.82rem;color:rgba(255,255,255,.42);line-height:1.9;margin-bottom:20px;max-width:240px}
.f-contacts{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.fc-row{display:flex;align-items:flex-start;gap:9px}
.fc-row span:first-child{color:var(--rose);flex-shrink:0;margin-top:1px}
.fc-row a,.fc-row p{font-size:.72rem;color:rgba(255,255,255,.5);text-decoration:none;line-height:1.6}
.fc-row a:hover{color:var(--rose)}
.f-socials{display:flex;gap:7px}
.f-soc{width:34px;height:34px;border-radius:var(--r);background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.45);text-decoration:none;font-size:.84rem;font-weight:700;transition:all .2s}
.f-soc:hover{background:var(--rose);color:#fff}
.f-ttl{font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.88);font-weight:700;margin-bottom:16px}
.f-list{list-style:none;display:flex;flex-direction:column;gap:9px}
.f-list a{font-size:.82rem;color:rgba(255,255,255,.43);text-decoration:none;transition:color .2s;display:flex;align-items:center;gap:5px}
.f-list a:hover{color:var(--rose)}
.f-list a::before{content:'›';color:var(--rose)}
.pay-tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px}
.pay-tag{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);color:rgba(255,255,255,.55);padding:5px 10px;border-radius:4px;font-size:10px;font-weight:700}
.f-hours{font-size:.72rem;color:rgba(255,255,255,.38);line-height:2.2}
.f-hours strong{color:var(--rose)}
.f-bottom{border-top:1px solid rgba(255,255,255,.06);padding:20px 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.f-bottom p{font-size:.72rem;color:rgba(255,255,255,.28)}
.f-bottom a{color:var(--rose);text-decoration:none}
.brands{background:#fff;padding:36px 48px;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.brand-track{overflow:hidden}
.brand-inner{display:flex;gap:56px;align-items:center;animation:bscroll 22s linear infinite;width:max-content}
.brand-item{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:var(--border);white-space:nowrap;transition:color .3s}
.brand-item:hover{color:var(--rose)}
@keyframes bscroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ban-row{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.ban-card{border-radius:10px;overflow:hidden;position:relative;min-height:210px;cursor:pointer}
.ban-card img{width:100%;height:100%;object-fit:cover;transition:transform .5s;display:block;min-height:210px}
.ban-card:hover img{transform:scale(1.05)}
.ban-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(26,10,15,.72) 0%,transparent 60%)}
.ban-ov{position:absolute;inset:0;padding:32px;display:flex;flex-direction:column;justify-content:center;z-index:2}
.ban-sub{font-size:.7rem;letter-spacing:3px;text-transform:uppercase;color:var(--gold-light);font-weight:700;margin-bottom:8px}
.ban-h2{font-family:'Cormorant Garamond',serif;font-size:1.9rem;color:#fff;font-weight:700;margin-bottom:12px;line-height:1.1}
.ban-btn{display:inline-flex;align-items:center;gap:8px;background:#fff;color:var(--ink);padding:9px 18px;border-radius:var(--r);font-size:.72rem;font-weight:700;text-transform:uppercase;text-decoration:none;transition:all .2s;width:fit-content}
.ban-btn:hover{background:var(--rose);color:#fff}
/* OVERLAY + CART */
.overlay{position:fixed;inset:0;background:rgba(26,10,15,.55);z-index:9990;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.on{opacity:1;pointer-events:all}
.cart-drw{position:fixed;right:0;top:0;bottom:0;width:420px;background:#fff;z-index:9995;box-shadow:-10px 0 40px rgba(26,10,15,.18);transform:translateX(100%);transition:transform .4s cubic-bezier(.77,0,.175,1);display:flex;flex-direction:column}
.cart-drw.on{transform:none}
.drw-head{display:flex;align-items:center;justify-content:space-between;padding:22px 26px;border-bottom:1px solid var(--border);flex-shrink:0}
.drw-head h3{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700}
.drw-close{background:var(--smoke);border:none;width:34px;height:34px;border-radius:50%;font-size:1.1rem;cursor:pointer;transition:background .2s}
.drw-close:hover{background:var(--rose);color:#fff}
.drw-body{flex:1;overflow-y:auto;padding:20px 26px;display:flex;flex-direction:column;gap:16px}
.cart-empty{text-align:center;padding:56px 0;color:var(--ink3)}
.cart-empty .ei{font-size:3.5rem;display:block;margin-bottom:12px;opacity:.3}
.c-item{display:flex;gap:12px;align-items:flex-start}
.c-img{width:72px;height:92px;border-radius:6px;overflow:hidden;flex-shrink:0;background:var(--smoke)}
.c-img img{width:100%;height:100%;object-fit:cover;display:block}
.c-info{flex:1}
.c-name{font-size:.84rem;font-weight:600;color:var(--ink);margin-bottom:3px;line-height:1.4}
.c-price{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:700;color:var(--rose)}
.c-qty{display:flex;align-items:center;gap:7px;margin-top:7px}
.qb{width:26px;height:26px;border-radius:4px;border:1.5px solid var(--border);background:none;cursor:pointer;font-size:.95rem;transition:all .2s}
.qb:hover{border-color:var(--rose);color:var(--rose)}
.qv{font-weight:700;font-size:.84rem;min-width:22px;text-align:center}
.c-rm{margin-left:auto;background:none;border:none;color:#ccc;cursor:pointer;font-size:.78rem;transit
