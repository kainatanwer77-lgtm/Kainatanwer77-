<!DOCTYPE html>
<html>
<head>
<title>Login - Kainat System</title>
<style>
body{font-family:Arial;background:#2c3e50;color:white;text-align:center}
.box{background:white;color:black;padding:30px;width:300px;margin:100px auto;border-radius:10px}
input{padding:10px;margin:10px;width:90%}
button{padding:10px;background:#27ae60;color:white;border:none;cursor:pointer}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input type="text" id="username" placeholder="Username"><br>
<input type="password" id="password" placeholder="Password"><br>

<button onclick="login()">Login</button>
</div>

<script>
function login(){
let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

// LOGIN CHECK
if(username === "admin" && password === "1234"){
    localStorage.setItem("login","true");
    window.location.href = "dashboard.html";
} else {
    alert("Wrong Username or Password");
}
}
</script>

</body>
</html>
