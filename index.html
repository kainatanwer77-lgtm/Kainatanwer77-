<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kainat Store</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=DM+Sans&display=swap" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOADER -->
<div id="ldr">
  <div class="ld-logo">Kainat Store</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
</div>

<!-- NAVBAR -->
<nav>
  <div class="nav-in">
    <a href="#" class="nav-logo">Kainat Store</a>
    <div class="nav-search">
      <input type="text" placeholder="Search...">
    </div>
    <button class="nav-btn" onclick="openCart()">🛒 Cart <span id="cBadge">0</span></button>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Welcome to Kainat Store</h1>
  <p>Best Fashion in Pakistan 🇵🇰</p>
  <a href="#products" class="btn">Shop Now</a>
</section>

<!-- PRODUCTS -->
<section id="products">
  <h2 style="padding:20px;">Products</h2>
  <div class="prod-grid" id="mainG"></div>
</section>

<!-- CART DRAWER -->
<div class="overlay" id="ov" onclick="closeCart()"></div>

<div class="cart-drw" id="cartDrw">
  <h3 style="padding:10px;">My Cart</h3>
  <p style="padding:10px;">Total: <span id="cTotal">Rs. 0</span></p>
  <button onclick="openCheckout()" style="margin:10px;">Checkout</button>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2025 Kainat Store</p>
</footer>

<!-- TOP BUTTON -->
<button id="btt" onclick="scrollTo({top:0,behavior:'smooth'})">↑</button>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
